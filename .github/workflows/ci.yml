name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm install
      
      - name: Setup fallback environment
        run: echo "POSTGRES_URL=postgresql://test:test@localhost:5432/test" > .env
      
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          POSTGRES_URL: postgresql://test:test@localhost:5432/test
      
      - name: Run lint
        run: npm run lint
      
      - name: Run build
        run: npm run build
        env:
          POSTGRES_URL: postgresql://test:test@localhost:5432/test
