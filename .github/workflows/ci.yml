name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POSTGRES_URL: postgresql://fallback:pass@localhost:5432/fallback

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Setup environment
        run: echo "POSTGRES_URL=postgresql://fallback:pass@localhost:5432/fallback" > .env
      - run: npx prisma generate
        env:
          POSTGRES_URL: postgresql://fallback:pass@localhost:5432/fallback
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Setup environment
        run: echo "POSTGRES_URL=postgresql://fallback:pass@localhost:5432/fallback" > .env
      - run: npx prisma generate
        env:
          POSTGRES_URL: postgresql://fallback:pass@localhost:5432/fallback
      - run: npm run build
        env:
          POSTGRES_URL: postgresql://fallback:pass@localhost:5432/fallback

  prisma:
    name: Prisma Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Setup environment
        run: echo "POSTGRES_URL=postgresql://fallback:pass@localhost:5432/fallback" > .env
      - run: npx prisma generate
        env:
          POSTGRES_URL: postgresql://fallback:pass@localhost:5432/fallback
      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          POSTGRES_URL: postgresql://fallback:pass@localhost:5432/fallback
